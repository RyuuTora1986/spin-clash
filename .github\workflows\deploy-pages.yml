name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      SPIN_CLASH_REWARD_ADAPTER: ${{ vars.SPIN_CLASH_REWARD_ADAPTER }}
      SPIN_CLASH_REWARD_MOCK_MODE: ${{ vars.SPIN_CLASH_REWARD_MOCK_MODE }}
      SPIN_CLASH_REWARD_ENABLED: ${{ vars.SPIN_CLASH_REWARD_ENABLED }}
      SPIN_CLASH_REWARD_SCRIPT_URL: ${{ vars.SPIN_CLASH_REWARD_SCRIPT_URL }}
      SPIN_CLASH_REWARDED_AD_UNIT_PATH: ${{ vars.SPIN_CLASH_REWARDED_AD_UNIT_PATH }}
      SPIN_CLASH_GAM_INTERSTITIAL_AD_UNIT_PATH: ${{ vars.SPIN_CLASH_GAM_INTERSTITIAL_AD_UNIT_PATH }}
      SPIN_CLASH_ANALYTICS_ADAPTER: ${{ vars.SPIN_CLASH_ANALYTICS_ADAPTER }}
      SPIN_CLASH_ANALYTICS_ENABLE_FORWARDING: ${{ vars.SPIN_CLASH_ANALYTICS_ENABLE_FORWARDING }}
      SPIN_CLASH_POSTHOG_ENABLED: ${{ vars.SPIN_CLASH_POSTHOG_ENABLED }}
      SPIN_CLASH_POSTHOG_PROJECT_API_KEY: ${{ vars.SPIN_CLASH_POSTHOG_PROJECT_API_KEY }}
      SPIN_CLASH_POSTHOG_API_HOST: ${{ vars.SPIN_CLASH_POSTHOG_API_HOST }}
      SPIN_CLASH_POSTHOG_SCRIPT_URL: ${{ vars.SPIN_CLASH_POSTHOG_SCRIPT_URL }}
      SPIN_CLASH_POSTHOG_CAPTURE_PAGEVIEW: ${{ vars.SPIN_CLASH_POSTHOG_CAPTURE_PAGEVIEW }}
      SPIN_CLASH_POSTHOG_AUTOCAPTURE: ${{ vars.SPIN_CLASH_POSTHOG_AUTOCAPTURE }}
      SPIN_CLASH_POSTHOG_DISABLE_SESSION_RECORDING: ${{ vars.SPIN_CLASH_POSTHOG_DISABLE_SESSION_RECORDING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Verify release package
        run: npm run verify:release

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

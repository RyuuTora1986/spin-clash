<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="google-adsense-account" content="ca-pub-4799303992679484">
<title>Spin Clash</title>
<link rel="stylesheet" href="./css/game.css?v=1.2.5">
</head>
<body>
<div id="gc"></div>
<div id="skill-flash"></div>
<div id="hud" style="display:none">
  <div class="hud-panel" id="p-panel">
    <div class="id-bar"></div>
    <div class="hud-inner">
      <div class="hud-who">
        <div class="hud-dot"></div>
        <div class="hud-who-labels">
          <div class="hud-top-name" id="p-name"></div>
          <div class="hud-role" id="p-role"></div>
        </div>
      </div>
      <div class="hud-hp-section">
        <div class="hud-hp-header">
          <span class="hud-hp-lbl" id="p-hp-lbl"></span>
          <span class="hud-hp-num" id="p-hp-val">140</span>
        </div>
        <div class="hud-hp-track">
          <div class="hud-hp-fill" id="p-hp" style="width:100%"></div>
        </div>
      </div>
      <div class="hud-sub-bars">
        <div class="hud-sub-row">
          <div class="hud-sub-lbl" id="p-spin-lbl"></div>
          <div class="hud-sub-track"><div class="hud-sub-fill sp-fill" id="p-sp" style="width:100%"></div></div>
        </div>
        <div class="hud-sub-row">
          <div class="hud-sub-lbl" id="p-burst-lbl"></div>
          <div class="hud-sub-track"><div class="hud-sub-fill bu-fill" id="p-bu" style="width:0%"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="skill-panel">
    <div class="sk-btn state-cooldown" id="act-dash" onclick="return window.__spinClashInvoke('dash')">
      <div class="sk-icon" id="dash-icon"></div>
      <div class="sk-name" id="dash-name"></div>
      <div class="sk-key">SPC</div>
      <div class="sk-state" id="dash-state"></div>
      <div class="sk-cd-mask" id="dash-cd" style="height:0%"></div>
      <div class="sk-cd-txt" id="dash-cd-txt"></div>
    </div>
    <div class="sk-btn state-cooldown" id="act-guard" onclick="return window.__spinClashInvoke('guard')">
      <div class="sk-icon" id="guard-icon"></div>
      <div class="sk-name" id="guard-name"></div>
      <div class="sk-key">E</div>
      <div class="sk-state" id="guard-state"></div>
      <div class="sk-cd-mask" id="guard-cd" style="height:0%"></div>
      <div class="sk-cd-txt" id="guard-cd-txt"></div>
    </div>
    <div class="sk-btn state-cooldown" id="act-skill" onclick="return window.__spinClashInvoke('skill')">
      <div class="sk-icon" id="sk-icon"></div>
      <div class="sk-name" id="sn"></div>
      <div class="sk-key">Q</div>
      <div class="sk-state" id="skill-state"></div>
      <div class="sk-cd-mask" id="skill-cd" style="height:0%"></div>
      <div class="sk-cd-txt" id="skill-cd-txt"></div>
      <svg class="sk-burst-ring" id="burst-ring" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="25" fill="none" stroke="rgba(255,180,0,0.45)" stroke-width="2.5" stroke-dasharray="157" stroke-dashoffset="157" stroke-linecap="round" transform="rotate(-90 28 28)" style="transition:stroke-dashoffset .08s linear"></circle>
      </svg>
    </div>
  </div>

  <div class="hud-panel" id="e-panel">
    <div class="id-bar"></div>
    <div class="hud-inner">
      <div class="hud-who">
        <div class="hud-dot"></div>
        <div class="hud-who-labels">
          <div class="hud-top-name" id="e-name"></div>
          <div class="hud-role" id="e-role"></div>
        </div>
      </div>
      <div class="hud-hp-section">
        <div class="hud-hp-header">
          <span class="hud-hp-lbl" id="e-hp-lbl"></span>
          <span class="hud-hp-num" id="e-hp-val">200</span>
        </div>
        <div class="hud-hp-track">
          <div class="hud-hp-fill" id="e-hp" style="width:100%"></div>
        </div>
      </div>
      <div class="hud-sub-bars">
        <div class="hud-sub-row">
          <div class="hud-sub-lbl" id="e-spin-lbl"></div>
          <div class="hud-sub-track"><div class="hud-sub-fill sp-fill" id="e-sp" style="width:100%"></div></div>
        </div>
        <div class="hud-sub-row">
          <div class="hud-sub-lbl" id="e-burst-lbl"></div>
          <div class="hud-sub-track"><div class="hud-sub-fill bu-fill" id="e-bu" style="width:0%"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="act-swap" onclick="return window.__spinClashInvoke('swap')"><span id="swap-icon"></span><small id="swap-label"></small></div>
  <div id="score-area">
    <div class="score-label-txt" id="score-label-round">ROUND</div>
    <div class="pips-row">
      <div class="pip" id="pp1"></div><div class="pip" id="pp2"></div>
      <div class="vs-txt">VS</div>
      <div class="pip" id="ep1"></div><div class="pip" id="ep2"></div>
    </div>
    <div id="round-lbl"></div>
  </div>
  <div id="timer-txt">30</div>
  <div id="hint-bar"></div>
</div>
<div class="battle-commentary hide" id="battle-commentary" aria-live="polite" aria-atomic="false"></div>
<div id="msg-txt"></div>
<div class="ov" id="ov-title">
  <h1 id="title-main"></h1>
  <div class="locale-switcher title-locale-switcher" id="locale-title-switcher">
    <button class="locale-btn" id="locale-title-en" data-locale-target="en" type="button" onclick="return window.__spinClashInvoke('setLocale','en')">EN</button>
    <button class="locale-btn" id="locale-title-zh" data-locale-target="zh" type="button" onclick="return window.__spinClashInvoke('setLocale','zh')">中文</button>
    <button class="locale-btn" id="locale-title-ja" data-locale-target="ja" type="button" onclick="return window.__spinClashInvoke('setLocale','ja')">日本語</button>
  </div>
  <div class="home-hero-panel" id="home-hero-panel">
    <div class="home-top-panel" id="home-top-panel">
      <button class="home-top-nav" id="btn-home-top-prev" type="button" onclick="return window.__spinClashInvoke('prevHomeTop')"></button>
      <div class="home-top-stage-shell">
        <div class="home-top-stage" id="home-top-stage"></div>
      </div>
      <div class="home-top-copy">
        <div class="home-top-kicker" id="home-top-kicker"></div>
        <div class="home-top-head">
          <div class="home-top-name" id="home-top-name"></div>
          <div class="home-top-count" id="home-top-count"></div>
        </div>
        <div class="home-top-type" id="home-top-type"></div>
        <div class="home-top-skill" id="home-top-skill"></div>
        <div class="home-top-traits" id="home-top-traits"></div>
      </div>
      <button class="home-top-nav" id="btn-home-top-next" type="button" onclick="return window.__spinClashInvoke('nextHomeTop')"></button>
    </div>
    <div class="home-command-panel" id="home-command-panel">
      <div class="title-status">
        <div class="title-status-line" id="title-progress"></div>
      </div>
      <div class="deco-line"></div>
      <div class="title-actions">
        <div class="title-actions-primary">
          <div class="title-action-block title-action-block-path">
            <button class="big-btn" id="btn-enter" onclick="return window.__spinClashInvoke('goPath')"></button>
            <div class="title-action-note" id="title-note-path"></div>
          </div>
          <div class="title-action-block title-action-block-quick">
            <button class="title-primary-btn" id="btn-enter-quick" onclick="return window.__spinClashInvoke('goQuick')"></button>
            <div class="title-action-note" id="title-note-quick"></div>
          </div>
        </div>
        <div class="title-actions-utility">
          <button class="title-alt-btn" id="btn-enter-workshop" onclick="return window.__spinClashInvoke('goWorkshop')"></button>
          <button class="title-alt-btn" id="btn-enter-settings" onclick="return window.__spinClashInvoke('goSettings')"></button>
        </div>
      </div>
      <div class="title-build-meta" id="title-build-meta">
        <div class="title-build-line" id="title-build-version"></div>
        <div class="title-build-line" id="title-build-copyright"></div>
        <div class="title-info-links" id="title-info-links">
          <button class="info-link-btn" id="btn-open-about-home" type="button" onclick="return window.__spinClashInvoke('openInfo','about')"></button>
          <button class="info-link-btn" id="btn-open-contact-home" type="button" onclick="return window.__spinClashInvoke('openInfo','contact')"></button>
          <button class="info-link-btn" id="btn-open-privacy-home" type="button" onclick="return window.__spinClashInvoke('openInfo','privacy')"></button>
          <button class="info-link-btn" id="btn-open-terms-home" type="button" onclick="return window.__spinClashInvoke('openInfo','terms')"></button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="ov hide" id="ov-loadout">
  <h2 id="loadout-title"></h2>
  <div class="sub2" id="loadout-subtitle"></div>
  <div class="locale-switcher loadout-locale-switcher" id="locale-loadout-switcher">
    <button class="locale-btn" id="locale-loadout-en" data-locale-target="en" type="button" onclick="return window.__spinClashInvoke('setLocale','en')">EN</button>
    <button class="locale-btn" id="locale-loadout-zh" data-locale-target="zh" type="button" onclick="return window.__spinClashInvoke('setLocale','zh')">中文</button>
    <button class="locale-btn" id="locale-loadout-ja" data-locale-target="ja" type="button" onclick="return window.__spinClashInvoke('setLocale','ja')">日本語</button>
  </div>
  <div class="shell-route-bar" id="shell-route-bar">
    <button class="route-back-btn" id="btn-route-back" type="button" onclick="return window.__spinClashInvoke('goBack')"></button>
    <div class="shell-route-copy">
      <div class="shell-route-title" id="shell-route-title"></div>
      <div class="shell-route-context" id="shell-route-context"></div>
    </div>
    <div class="shell-route-actions" id="shell-route-actions">
      <button class="route-chip-btn" id="btn-route-workshop" type="button" onclick="return window.__spinClashInvoke('goWorkshop')"></button>
      <button class="route-chip-btn" id="btn-route-settings" type="button" onclick="return window.__spinClashInvoke('goSettings')"></button>
    </div>
  </div>
  <div class="currency-bar" id="currency-bar"></div>
  <div class="featured-top-panel">
    <div class="featured-top-copy">
      <div class="featured-top-title" id="featured-top-title"></div>
      <div class="featured-top-name" id="featured-top-name"></div>
      <div class="featured-top-type" id="featured-top-type"></div>
      <div class="featured-top-skill" id="featured-top-skill"></div>
    </div>
    <div class="featured-top-meta">
      <div class="featured-traits-title" id="featured-traits-title"></div>
      <div class="featured-top-traits" id="featured-top-traits"></div>
    </div>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="mode-quick" type="button" onclick="return window.__spinClashInvoke('setMode','quick')"></button>
    <button class="mode-tab" id="mode-challenge" type="button" onclick="return window.__spinClashInvoke('setMode','challenge')"></button>
  </div>
  <div class="mode-hint" id="mode-hint"></div>
  <div class="workshop-panel hide" id="workshop-panel">
    <div class="workshop-head">
      <div class="workshop-title" id="workshop-title"></div>
      <div class="workshop-balance" id="workshop-balance"></div>
    </div>
    <div class="workshop-hint" id="workshop-hint"></div>
    <div class="research-track" id="research-track-0">
      <div class="research-copy">
        <div class="research-name" id="research-name-0"></div>
        <div class="research-desc" id="research-desc-0"></div>
      </div>
      <div class="research-meta">
        <div class="research-level" id="research-level-0"></div>
        <div class="research-bonus" id="research-bonus-0"></div>
        <div class="research-next" id="research-next-0"></div>
        <div class="research-impact" id="research-impact-0"></div>
        <div class="research-cost-note" id="research-cost-0"></div>
      </div>
      <button class="research-buy" id="research-buy-0" type="button" onclick="return window.__spinClashInvoke('buyResearch',0)"></button>
    </div>
    <div class="research-track" id="research-track-1">
      <div class="research-copy">
        <div class="research-name" id="research-name-1"></div>
        <div class="research-desc" id="research-desc-1"></div>
      </div>
      <div class="research-meta">
        <div class="research-level" id="research-level-1"></div>
        <div class="research-bonus" id="research-bonus-1"></div>
        <div class="research-next" id="research-next-1"></div>
        <div class="research-impact" id="research-impact-1"></div>
        <div class="research-cost-note" id="research-cost-1"></div>
      </div>
      <button class="research-buy" id="research-buy-1" type="button" onclick="return window.__spinClashInvoke('buyResearch',1)"></button>
    </div>
    <div class="research-track" id="research-track-2">
      <div class="research-copy">
        <div class="research-name" id="research-name-2"></div>
        <div class="research-desc" id="research-desc-2"></div>
      </div>
      <div class="research-meta">
        <div class="research-level" id="research-level-2"></div>
        <div class="research-bonus" id="research-bonus-2"></div>
        <div class="research-next" id="research-next-2"></div>
        <div class="research-impact" id="research-impact-2"></div>
        <div class="research-cost-note" id="research-cost-2"></div>
      </div>
      <button class="research-buy" id="research-buy-2" type="button" onclick="return window.__spinClashInvoke('buyResearch',2)"></button>
    </div>
  </div>
  <div class="settings-panel hide" id="settings-panel">
    <div class="settings-row settings-row-stack">
      <div class="settings-label" id="settings-language-label"></div>
      <div class="locale-switcher settings-locale-switcher" id="locale-settings-switcher">
        <button class="locale-btn" id="locale-settings-en" data-locale-target="en" type="button" onclick="return window.__spinClashInvoke('setLocale','en')">EN</button>
        <button class="locale-btn" id="locale-settings-zh" data-locale-target="zh" type="button" onclick="return window.__spinClashInvoke('setLocale','zh')">涓枃</button>
        <button class="locale-btn" id="locale-settings-ja" data-locale-target="ja" type="button" onclick="return window.__spinClashInvoke('setLocale','ja')">鏃ユ湰瑾?/button>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label" id="settings-music-label"></div>
      <button class="settings-toggle-btn" id="btn-settings-music" type="button" onclick="return window.__spinClashInvoke('toggleMusic')"></button>
    </div>
    <div class="settings-row">
      <div class="settings-label" id="settings-sfx-label"></div>
      <button class="settings-toggle-btn" id="btn-settings-sfx" type="button" onclick="return window.__spinClashInvoke('toggleSfx')"></button>
    </div>
    <div class="settings-info-links" id="settings-info-links">
      <button class="settings-link-btn" id="btn-open-about-settings" type="button" onclick="return window.__spinClashInvoke('openInfo','about')"></button>
      <button class="settings-link-btn" id="btn-open-contact-settings" type="button" onclick="return window.__spinClashInvoke('openInfo','contact')"></button>
      <button class="settings-link-btn" id="btn-open-privacy-settings" type="button" onclick="return window.__spinClashInvoke('openInfo','privacy')"></button>
      <button class="settings-link-btn" id="btn-open-terms-settings" type="button" onclick="return window.__spinClashInvoke('openInfo','terms')"></button>
    </div>
  </div>
  <div class="ov hide" id="ov-info">
    <div class="info-shell">
      <div class="info-shell-head">
        <button class="route-back-btn" id="btn-info-back" type="button" onclick="return window.__spinClashInvoke('closeInfo')"></button>
        <div class="info-shell-title" id="info-shell-title"></div>
      </div>
      <div class="info-shell-body" id="info-shell-body"></div>
    </div>
  </div>
  <div class="challenge-panel hide" id="challenge-panel">
    <div class="challenge-kicker" id="challenge-kicker"></div>
    <div class="challenge-summary-grid">
      <div class="challenge-summary-card challenge-summary-primary">
        <div class="challenge-line" id="challenge-node-name"></div>
        <div class="challenge-line" id="challenge-node-detail"></div>
      </div>
      <div class="challenge-summary-card challenge-summary-reward">
        <div class="challenge-progress-kicker" id="challenge-progress-kicker"></div>
        <div class="challenge-line" id="challenge-progress"></div>
        <div class="challenge-line challenge-goal-note" id="challenge-goal-note"></div>
      </div>
    </div>
    <div class="challenge-route-strip" id="challenge-route-strip"></div>
    <div class="challenge-rank-title" id="challenge-rank-title"></div>
    <div class="challenge-rank-strip">
      <button class="challenge-rank-btn" id="challenge-rank-0" type="button" onclick="return window.__spinClashInvoke('setRoadRank',0)"></button>
      <button class="challenge-rank-btn" id="challenge-rank-1" type="button" onclick="return window.__spinClashInvoke('setRoadRank',1)"></button>
      <button class="challenge-rank-btn" id="challenge-rank-2" type="button" onclick="return window.__spinClashInvoke('setRoadRank',2)"></button>
    </div>
    <div class="challenge-rank-note" id="challenge-rank-note"></div>
    <div class="challenge-current-top-panel">
      <div class="challenge-current-top-kicker" id="challenge-current-top-kicker"></div>
      <div class="challenge-current-top-name" id="challenge-current-top-name"></div>
      <div class="challenge-current-top-note" id="challenge-current-top-note"></div>
    </div>
  </div>
  <div class="quick-battle-panel hide" id="quick-battle-panel">
    <div class="quick-ready-band" id="quick-ready-band">
      <div class="quick-ready-panel">
        <div class="quick-selected-top-panel">
          <div class="quick-selected-top-stage" id="quick-selected-top-stage"></div>
          <div class="quick-selected-top-copy">
            <div class="quick-selected-top-kicker" id="quick-selected-top-kicker"></div>
            <div class="quick-selected-top-head">
              <div class="quick-selected-top-name" id="quick-selected-top-name"></div>
              <div class="quick-selected-top-status" id="quick-selected-top-status"></div>

            <div class="quick-selected-top-source" id="quick-selected-top-source"></div>

            <div class="quick-selected-top-wallet" id="quick-selected-top-wallet"></div>
            <button class="quick-top-action-btn hide" id="btn-quick-top-action" type="button" onclick="return window.__spinClashInvoke('quickTopAction')"></button>
          </div>
        </div>
        <div class="quick-start-panel">
          <div class="quick-start-hint" id="quick-start-hint"></div>
          <button class="big-btn" id="btn-fight" onclick="return window.__spinClashInvoke('startFight')"></button>

            <div class="quick-arena-name" id="quick-arena-name"></div>
            <div class="quick-arena-status" id="quick-arena-status"></div>
          </div>
          <div class="quick-arena-desc" id="quick-arena-desc"></div>
        </div>
      </div>
      <button class="quick-arena-nav" id="btn-quick-arena-next" type="button" onclick="return window.__spinClashInvoke('nextQuickArena')"></button>
    </div>
  </div>
  <div class="arena-sel">
    <div class="arena-opt sel" data-arena="0" id="arena-opt-0" onclick="return window.__spinClashInvoke('selectArena',0)"></div>
    <div class="arena-opt" data-arena="1" id="arena-opt-1" onclick="return window.__spinClashInvoke('selectArena',1)"></div>
    <div class="arena-opt" data-arena="2" id="arena-opt-2" onclick="return window.__spinClashInvoke('selectArena',2)"></div>

  <button class="big-btn path-fight-btn" id="btn-path-fight" onclick="return window.__spinClashInvoke('startFight')"></button>

<div class="ov hide result-overlay" id="ov-match">
  <div class="result-shell match-result-shell">
    <div class="result-kicker" id="mt-kicker">MATCH RESULT</div>
    <h2 id="mt-txt" style="color:#00ffcc"></h2>
    <div class="mt-sub" id="mt-sub"></div>

    <div class="mt-breakdown" id="mt-breakdown"></div>
